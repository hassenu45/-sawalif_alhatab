<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوالف على الحطب</title>
    <link rel="stylesheet" href="login.css">
</head>
<body class="show-video">
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="5392928583_pin.mp4" type="video/mp4">
    </video>
    <div class="main-content">
        <h1 class="site-title">سوالف على الحطب</h1>

        <div class="container">
            <div class="card">
                <img src="dhrah.png" alt="ذره" class="card-img">
                <p>ذره</p>
            </div>
            <div class="card" onclick="openMenu('shay')">
                <img src="shay.png" alt="شاي" class="card-img">
                <p>شاي</p>
            </div>
            <div class="card">
                <img src="bushar.png" alt="بوشار" class="card-img">
                <p>بوشار</p>
            </div>
        </div>
    </div>

    <div class="cart-box" id="cartBox" onclick="openCart()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="cart-icon">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge hidden" id="cartBadge">0</span>
    </div>

    <div class="cart-overlay hidden" id="cartOverlay">
        <div class="cart-panel">
            <div class="cart-header">
                <h2>سلة الطلبات</h2>
                <button class="cart-close" onclick="closeCart()">✕</button>
            </div>
            <div class="cart-body" id="cartBody">
                <p class="cart-empty">لا توجد طلبات</p>
            </div>
        </div>
    </div>

    <div class="menu-overlay hidden" id="menuOverlay">
        <div class="menu-panel" id="menuPanel">
            <div class="menu-header">
                <h2 id="menuTitle">شاي</h2>
            </div>
            <div class="menu-body" id="menuBody"></div>
        </div>
    </div>

    <div class="social">
        <a href="https://www.instagram.com/sawalif_alhatab?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank" class="social-icon" title="انستقرام">
            <svg viewBox="0 0 24 24" fill="none" stroke="#d4a056" stroke-width="1.5">
                <rect x="2" y="2" width="20" height="20" rx="5"/>
                <circle cx="12" cy="12" r="5"/>
                <circle cx="17.5" cy="6.5" r="1.5"/>
            </svg>
        </a>
        <a href="https://www.facebook.com/profile.php?id=61579113160515" target="_blank" class="social-icon" title="فيسبوك">
            <svg viewBox="0 0 24 24" fill="none" stroke="#d4a056" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M16 8h-2a2 2 0 0 0-2 2v10M12 12h4"/>
            </svg>
        </a>
    </div>

    <script>
        let currentOrder = {};
        let orders = [];

        const menuData = {
            shay: {
                title: 'شاي',
                steps: [
                    {
                        question: 'اختر نوع الشاي',
                        options: [
                            { label: 'شاي كرك', value: 'كرك', img: 'kerk.png' },
                            { label: 'شاي عادي', value: 'عادي', img: 'ady.png' }
                        ]
                    },
                    {
                        question: 'اختر نسبة السكر',
                        options: [
                            { label: 'حلوه', value: 'حلوه' },
                            { label: 'وسط', value: 'وسط' },
                            { label: 'ساده', value: 'ساده' }
                        ]
                    },
                    {
                        question: 'اختر الإضافات',
                        skipIf: () => currentOrder.type === 'كرك',
                        options: [
                            { label: 'نعنع', value: 'نعنع' },
                            { label: 'ميرميه', value: 'ميرميه' },
                            { label: 'بدون', value: 'بدون' }
                        ]
                    }
                ]
            }
        };

        function openMenu(item) {
            const data = menuData[item];
            if (!data) return;
            document.getElementById('menuOverlay').classList.remove('hidden');
            document.getElementById('menuTitle').textContent = data.title;
            currentOrder = {};
            renderStep(0);
        }

        function renderStep(stepIndex) {
            const data = menuData['shay'];
            const step = data.steps[stepIndex];
            if (!step) return;
            const body = document.getElementById('menuBody');
            body.innerHTML = '';
            const question = document.createElement('p');
            question.className = 'menu-question';
            question.textContent = step.question;
            body.appendChild(question);
            const grid = document.createElement('div');
            grid.className = 'menu-grid';
            step.options.forEach((opt) => {
                const card = document.createElement('button');
                card.className = 'menu-option';
                if (opt.img) {
                    const img = document.createElement('img');
                    img.src = opt.img;
                    img.alt = opt.label;
                    img.className = 'menu-opt-img';
                    card.appendChild(img);
                }
                const span = document.createElement('span');
                span.textContent = opt.label;
                card.appendChild(span);
                card.onclick = () => {
                    if (stepIndex === 0) currentOrder.type = opt.value;
                    else if (stepIndex === 1) currentOrder.sugar = opt.value;
                    else currentOrder.addon = opt.value;
                    let next = stepIndex + 1;
                    if (next < data.steps.length && data.steps[next].skipIf && data.steps[next].skipIf()) {
                        next++;
                    }
                    if (next < data.steps.length) {
                        renderStep(next);
                    } else {
                        showOrder();
                    }
                };
                grid.appendChild(card);
            });
            body.appendChild(grid);
        }

        function showOrder() {
            const body = document.getElementById('menuBody');
            body.innerHTML = '';
            const done = document.createElement('p');
            done.className = 'menu-done';
            let summary = 'شاي ' + currentOrder.type + ' | ' + currentOrder.sugar;
            if (currentOrder.addon) summary += ' | ' + currentOrder.addon;
            done.textContent = summary;
            body.appendChild(done);
            const noteLabel = document.createElement('p');
            noteLabel.className = 'menu-note-label';
            noteLabel.textContent = 'أكتب ملاحظتك على الطلب';
            body.appendChild(noteLabel);
            const noteInput = document.createElement('textarea');
            noteInput.className = 'menu-note';
            noteInput.placeholder = 'أضف ملاحظة...';
            noteInput.id = 'orderNote';
            body.appendChild(noteInput);
            const closeBtn = document.createElement('button');
            closeBtn.className = 'menu-option menu-confirm';
            closeBtn.textContent = 'إضافة إلى الطلب';
            closeBtn.onclick = () => {
                const note = document.getElementById('orderNote').value;
                orders.push({ item: summary, note: note });
                document.getElementById('cartBadge').textContent = orders.length;
                document.getElementById('cartBadge').classList.remove('hidden');
                closeMenu();
            };
            body.appendChild(closeBtn);
        }

        function closeMenu() {
            document.getElementById('menuOverlay').classList.add('hidden');
        }

        document.getElementById('menuOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeMenu();
        });

        function openCart() {
            const body = document.getElementById('cartBody');
            body.innerHTML = '';
            if (orders.length === 0) {
                body.innerHTML = '<p class="cart-empty">لا توجد طلبات</p>';
            } else {
                orders.forEach((o, i) => {
                    const div = document.createElement('div');
                    div.className = 'cart-item';
                    div.innerHTML = '<span class="cart-item-text">' + o.item + '</span>' +
                        (o.note ? '<span class="cart-item-note">' + o.note + '</span>' : '') +
                        '<button class="cart-item-del" onclick="removeOrder(' + i + ')">✕</button>';
                    body.appendChild(div);
                });
                const total = document.createElement('p');
                total.className = 'cart-total';
                total.textContent = 'العدد: ' + orders.length;
                body.appendChild(total);
                const sendBtn = document.createElement('button');
                sendBtn.className = 'cart-send';
                sendBtn.textContent = 'أبعث الطلبات';
                sendBtn.onclick = sendOrders;
                body.appendChild(sendBtn);
            }
            document.getElementById('cartOverlay').classList.remove('hidden');
        }

        function closeCart() {
            document.getElementById('cartOverlay').classList.add('hidden');
        }

        document.getElementById('cartOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeCart();
        });

        function removeOrder(index) {
            orders.splice(index, 1);
            document.getElementById('cartBadge').textContent = orders.length;
            if (orders.length === 0) document.getElementById('cartBadge').classList.add('hidden');
            openCart();
        }

        function sendOrders() {
            let msg = 'طلباتي:\n';
            orders.forEach((o, i) => {
                msg += (i + 1) + '. ' + o.item;
                if (o.note) msg += ' (ملاحظة: ' + o.note + ')';
                msg += '\n';
            });
            const url = 'https://wa.me/9665392928583?text=' + encodeURIComponent(msg);
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
